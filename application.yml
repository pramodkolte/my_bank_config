spring:
  datasource:
    url: jdbc:postgresql://${RDS_DB_HOST:postgres-db}:${RDS_DB_PORT:5432}/postgres
    username: pk_admin
    password: ${RDS_DB_PASSWORD:postgres}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: true
  kafka:
    bootstrap-servers: kafka-broker:9092
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://identity-service:8081

eureka:
  client:
    serviceUrl:
      defaultZone: http://discovery-server:8761/eureka/
